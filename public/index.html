<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <title>Unity Cloud Code Demo</title>

    <style>

        body{
            font-family:Arial;
            margin-top:80px;
            text-align:center;
        }

        input{

            width:250px;
            padding:10px;
            font-size:18px;
        }

        button{

            padding:10px 25px;
            font-size:18px;
            cursor:pointer;
            margin-left:10px;
        }

        #result{

            margin-top:30px;
            font-size:24px;
            color:green;
        }

    </style>

</head>

<body>

<h1>Unity Cloud Code</h1>

<input
id="txtName"
placeholder="Enter your name">

<button onclick="sayHello()">

Say Hello

</button>

<div id="result"></div>

<script>

async function sayHello(){

    const name =
    document.getElementById("txtName").value;

    if(name=="")
    {
        alert("Please enter your name");
        return;
    }

    const response =
    await fetch("/say-hello",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            name:name
        })
    });

    const json =
    await response.json();

    if(json.success)
    {
        document.getElementById("result").innerHTML = json.result.output;
        // document.getElementById("result").innerHTML= json.result;
    }
    else
    {
        document.getElementById("result").innerHTML=json.message;
    }

}

</script>

</body>

</html>
