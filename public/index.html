<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Unity Cloud Code Admin</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            margin: 40px;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,.15);
            max-width: 500px;
        }

        h2 {
            margin-top: 0;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 15px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        .result {
            margin-top: 15px;
            color: green;
            white-space: pre-wrap;
        }

        .error {
            color: red;
        }
    </style>
</head>

<body>

<div class="card">

    <h2>Say Hello</h2>

    <input
        id="txtName"
        placeholder="Enter your name">

    <button onclick="sayHello()">
        Say Hello
    </button>

    <div
        id="helloResult"
        class="result">
    </div>

</div>


<div class="card">

    <h2>Delete Player Cloud Save</h2>

    <input
        id="txtPlayerId"
        placeholder="Enter Player ID">

    <button onclick="deletePlayerData()">
        Delete Player Data
    </button>

    <div
        id="deleteResult"
        class="result">
    </div>

</div>

<script>

async function sayHello(){

    const name =
        document.getElementById("txtName").value.trim();

    if(name===""){
        alert("Please enter a name");
        return;
    }

    const response =
        await fetch("/say-hello",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                name:name
            })
        });

  const json =await response.json();

    if(json.success)
    {
        document.getElementById("result").innerHTML = json.result.output;
        // document.getElementById("result").innerHTML= json.result;
    }
    else
    {
        document.getElementById("result").innerHTML=json.message;
    }
}



async function deletePlayerData(){

    const playerId =
        document.getElementById("txtPlayerId").value.trim();

    if(playerId===""){
        alert("Please enter Player ID");
        return;
    }

    const response =
        await fetch("/DeletePlayerDataByPlayerId",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                playerId:playerId
            })
        });

    const json = await response.json();

    const result =
        document.getElementById("deleteResult");

    if(json.success){

        result.innerText=
            json.message;

        result.className="result";
    }
    else{

        result.innerText=
            json.message;

        result.className="result error";
    }

}

</script>

</body>
</html>
